Menus:
  Rank_Menu:
    Menu_Size: 27
    Menu_Title: "&2Ranks"
    Update_Buttons: true
    Delay: 5
    Menu_Items:
      VIP_Rank:
        Priority: 0
        Update_Button: false
        Button_delay: 2
        Glow: true
        Slot: 10
        Icon: GOLD_INGOT
        Display_name: "&6VIP Rank"
        Lore:
          - "&7Grants VIP perks"
          - "&7Cost: &a20 coins"
        View_requirement:
          Requirement:
            Permission:
              type: "!has permission"
              input: "rank.vip"
        Click_requirement:
          Requirement:
            Money:
              type: has money
              amount: 20
              success_commands:
                - "[console] lp user %player_name% permission set rank.vip"
                - "[message] &aYou are now VIP!"
              deny_commands:
                - "[message] &cYou don't have enough coins!"
