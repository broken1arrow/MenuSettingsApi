Menus:
  Rank_Menu:
    Menu_Size: 27
    Menu_Title: "&2Ranks"
    Refresh_all_buttons: false
    Update_all_buttons_delay: -1
    Menu_Items:
      VIP_Rank:
        Priority: 0
        Update_Button: true
        Update_delay: 5
        Glow: true
        Slot: 10
        Icon: GOLD_INGOT
        Display_name: "&6VIP Rank"
        Lore:
          - "&7Grants VIP perks"
          - "&7Cost: &a20 coins"
        View_requirement:
          Requirement:
            Permission:
              type: "!has permission"
              permission: rank.vip
        Click_requirement:
          Requirement:
            Money:
              type: has money
              amount: 20
              success_commands:
                - "[message] &aYou are now VIP!"
              deny_commands:
                - "[message] &cYou don't have enough coins!"
        Click_commands:
          - "[takemoney] 20"
          - "[console] lp user %player_name% permission set rank.vip"
