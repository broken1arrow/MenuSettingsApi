Menus:
  ######################################################
  # MainMenu.
  Main_Menu:
    Menu_Size: 36
    Menu_Title: "&1Main menu"
    # slots you want to use to add items inside.
    FillSpace: 9-35
    #This two options below depends on how the plugin implement this options.
    #If i shall update all buttons when one is clicked.
    Refresh_all_buttons: false
    #time format depends on the plugin 
    Update_all_buttons_delay: -1
    Open_requirement:
      Requirement:
        Permission:
          type: has permission
          input: "test"
        Money:
          type: <
          output: 5
          input: 0
    # menu key for all items in the menu (don´t change this name).
    Menu_Items:
      # one menu item.
      Menu_Icon:
        Priority: 0
        #This three options below depends on how the plugin implement this options.
        #update the button when click
        Refresh: true
        #update the button on timer
        Update_Button: false
        #time format depends on the plugin
        Update_delay: 5
        Glow: true
        Slot: 11
        Icon: SUNFLOWER
        View_requirement:
          Requirement:
            Custom:
              type: custom
              output: "test"
              success_commands:
                - "command success"
              deny_commands:
                - "command deny"
        Display_name: "&6Example item"
        Lore:
          - ""
          - "&4Example lore"
        # This is all different requirement checks you
        # can use to check different clicks.
        #
        # Right_click_requirement:
        # Shift_left_click_requirement:
        # Shift_right_click_requirement:
        # Left_click_requirement:
        # Middle_click_requirement:
        Click_requirement:
          Requirement:
            something:
              type: has permission
              output: "test"
              success_commands:
                - "[message] &7success"
              deny_commands:
                - "[message] &7failed"
        Click_commands:
          - "[message] &6Anny button trigger this"
#        Left_click_commands:
#          - "[message] &7Left click"
#        Right_click_commands:
#          - "[message] &4Right click"
#        Left_shift_click_commands:
#          - "[message] &4Left and shift click"
#        Right_shift_click_commands:
#          - "[message] &4Right and shift click "
#        Middle_click_commands:
#          - "[message] &7Middle click"

      